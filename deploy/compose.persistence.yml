name: rnabag-persistence

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${RNABAG_POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${RNABAG_POSTGRES_DATA_DIR:?RNABAG_POSTGRES_DATA_DIR is required}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${RNABAG_S3_PORT:-9000}:9000"
      - "127.0.0.1:${RNABAG_S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - "${RNABAG_OBJECT_DATA_DIR:?RNABAG_OBJECT_DATA_DIR is required}:/data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    volumes:
      - "./minio-rnabag-policy.json:/policy/rnabag-app.json:ro"
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set rnabag http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing rnabag/"$$RNABAG_S3_BUCKET" &&
        mc anonymous set none rnabag/"$$RNABAG_S3_BUCKET" &&
        mc admin policy create rnabag rnabag-app /policy/rnabag-app.json || true &&
        mc admin user add rnabag "$$RNABAG_S3_ACCESS_KEY" "$$RNABAG_S3_SECRET_KEY" || true &&
        mc admin policy attach rnabag rnabag-app --user "$$RNABAG_S3_ACCESS_KEY"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      RNABAG_S3_ACCESS_KEY: ${RNABAG_S3_ACCESS_KEY:?RNABAG_S3_ACCESS_KEY is required}
      RNABAG_S3_SECRET_KEY: ${RNABAG_S3_SECRET_KEY:?RNABAG_S3_SECRET_KEY is required}
      RNABAG_S3_BUCKET: ${RNABAG_S3_BUCKET:?RNABAG_S3_BUCKET is required}
