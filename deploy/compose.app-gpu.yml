name: rnabag-app-gpu

services:
  app:
    image: rnabag-app-gpu:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app-gpu
    restart: unless-stopped
    init: true
    network_mode: host
    user: "${RNABAG_UID:?RNABAG_UID is required}:${RNABAG_GID:?RNABAG_GID is required}"
    working_dir: /app
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      RNABAG_PERSISTENCE_ENABLED: ${RNABAG_PERSISTENCE_ENABLED:-true}
      RNABAG_DATABASE_URL: ${RNABAG_DATABASE_URL:?RNABAG_DATABASE_URL is required}
      RNABAG_S3_ENDPOINT_URL: ${RNABAG_S3_ENDPOINT_URL:?RNABAG_S3_ENDPOINT_URL is required}
      RNABAG_S3_ACCESS_KEY: ${RNABAG_S3_ACCESS_KEY:?RNABAG_S3_ACCESS_KEY is required}
      RNABAG_S3_SECRET_KEY: ${RNABAG_S3_SECRET_KEY:?RNABAG_S3_SECRET_KEY is required}
      RNABAG_S3_BUCKET: ${RNABAG_S3_BUCKET:?RNABAG_S3_BUCKET is required}
      RNABAG_S3_REGION: ${RNABAG_S3_REGION:-us-east-1}
      RNABAG_TEMP_DIR: ${RNABAG_TEMP_DIR:?RNABAG_TEMP_DIR is required}
      RNABAG_DEVICE: cuda:0
      RNABAG_BATCH_SIZE: "1"
      RNABAG_APP_BIND_IP: ${RNABAG_APP_BIND_IP:?RNABAG_APP_BIND_IP is required}
      RNABAG_APP_PORT: ${RNABAG_APP_PORT:-8000}
    volumes:
      - "${RNABAG_CODE_DIR:?RNABAG_CODE_DIR is required}:/app:ro"
      - "${RNABAG_TEMP_DIR:?RNABAG_TEMP_DIR is required}:${RNABAG_TEMP_DIR}:rw"
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${RNABAG_GPU_DEVICE_ID:?RNABAG_GPU_DEVICE_ID is required}"]
              capabilities: [gpu]
    command:
      - python3
      - -m
      - uvicorn
      - backend.app.main:app
      - --host
      - "${RNABAG_APP_BIND_IP:?RNABAG_APP_BIND_IP is required}"
      - --port
      - "${RNABAG_APP_PORT:-8000}"
      - --workers
      - "1"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >-
          import os, urllib.request;
          urllib.request.urlopen('http://' + os.environ['RNABAG_APP_BIND_IP'] + ':' + os.environ['RNABAG_APP_PORT'] + '/api/v1/health/ready', timeout=5).read()
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 30s
    stop_grace_period: 30s
