name: rnabag-gateway

services:
  gateway:
    image: nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    restart: unless-stopped
    network_mode: host
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - "${RNABAG_GATEWAY_CONFIG_FILE:?RNABAG_GATEWAY_CONFIG_FILE is required}:/etc/nginx/conf.d/default.conf:ro"
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=16m
      - /var/cache/nginx:rw,nosuid,nodev,size=64m
      - /var/run:rw,nosuid,nodev,size=16m
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget --quiet --output-document=/dev/null
          http://127.0.0.1:${RNABAG_GATEWAY_PORT:-8080}/api/v1/health/ready
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 10s
    stop_grace_period: 15s
