server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/rnabag;
    index index.html;
    autoindex off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
    add_header Cache-Control "no-store" always;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /probe/ping {
        proxy_pass http://100.113.222.1:18080/probe/ping;
        proxy_http_version 1.1;

        limit_except GET HEAD {
            deny all;
        }

        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_request_buffering off;
        proxy_buffering off;

        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;

        access_log off;
    }

    location ^~ /api/v1/ {
        default_type application/json;
        return 503 '{"detail":{"code":"API_NOT_ENABLED","message":"Public preview only; inference is not enabled."}}';
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
